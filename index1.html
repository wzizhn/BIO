<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ocean Wang</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0a0a0a;
    color: #e5e5e5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    line-height: 1.6;
  }

  .container {
    max-width: 560px;
    width: 100%;
    text-align: center;
  }

  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    margin: 0 auto 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    font-weight: 600;
    color: #fff;
  }

  h1 {
    font-size: 2.25rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
    letter-spacing: -0.02em;
  }

  .role {
    color: #a1a1aa;
    font-size: 1rem;
    margin-bottom: 1.5rem;
  }

  .bio {
    color: #d4d4d8;
    font-size: 1.05rem;
    margin-bottom: 2.5rem;
    max-width: 440px;
    margin-left: auto;
    margin-right: auto;
  }

  .links {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.7rem 1.25rem;
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 10px;
    color: #e5e5e5;
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 500;
    transition: all 0.2s ease;
  }

  .link:hover {
    background: #27272a;
    border-color: #3f3f46;
    transform: translateY(-2px);
  }

  .link svg {
    width: 18px;
    height: 18px;
  }

  footer {
    position: fixed;
    bottom: 1.5rem;
    left: 0;
    right: 0;
    text-align: center;
    color: #52525b;
    font-size: 0.85rem;
  }
</style>
</head>
<body>
  <main class="container">
    <div class="avatar">OW</div>
    <h1>Ocean Wang</h1>
    <p class="role">Year 13 IB Student · Kristin School</p>
    <p class="bio">
      High school student exploring code, ideas, and everything in between.
    </p>

    <div class="links">

        GitHub
      </a>
      <a href="https://www.instagram.com/wzizhn_/" class="link" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>

    </div>
  </main>
  <footer>© 2026 Ocean Wang</footer>
</body>
</html>
