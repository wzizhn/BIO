<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hot Takes Wall</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --surface: #18181b;
    --surface-2: #27272a;
    --border: #2a2a2e;
    --text: #e5e5e5;
    --muted: #a1a1aa;
    --accent: #f97316;
    --green: #10b981;
    --red: #ef4444;
    --spice: #fb923c;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    overflow-x: hidden;
    position: relative;
  }

  .bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    overflow: hidden;
    background:
      radial-gradient(ellipse at top, #1a0d0d 0%, #0a0a0a 60%);
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.5;
    will-change: transform;
  }

  .orb.o1 {
    width: 480px; height: 480px;
    background: #f97316;
    top: -120px; left: -100px;
    animation: drift1 22s ease-in-out infinite;
  }

  .orb.o2 {
    width: 380px; height: 380px;
    background: #ef4444;
    bottom: -100px; right: -80px;
    animation: drift2 28s ease-in-out infinite;
  }

  .orb.o3 {
    width: 320px; height: 320px;
    background: #8b5cf6;
    top: 40%; left: 50%;
    animation: drift3 30s ease-in-out infinite;
  }

  @keyframes drift1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(120px, 80px) scale(1.15); }
    66% { transform: translate(60px, 200px) scale(0.9); }
  }

  @keyframes drift2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-180px, -120px) scale(1.2); }
  }

  @keyframes drift3 {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    25% { transform: translate(-70%, -30%) scale(1.1); }
    50% { transform: translate(-30%, -60%) scale(0.85); }
    75% { transform: translate(-60%, -70%) scale(1.05); }
  }

  @media (prefers-reduced-motion: reduce) {
    .orb { animation: none; }
  }

  .wrap, form, .card {
    position: relative;
    z-index: 1;
  }

  form, .card {
    backdrop-filter: blur(10px);
    background: rgba(24, 24, 27, 0.7);
  }

  .wrap {
    max-width: 960px;
    margin: 0 auto;
    padding: 3rem 1.5rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  h1 {
    font-size: 2.25rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
  }

  h1 .flame { color: var(--accent); }

  header p {
    color: var(--muted);
    font-size: 1rem;
  }

  form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem;
    margin-bottom: 2rem;
    display: grid;
    gap: 0.75rem;
  }

  textarea, input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 0.9rem;
    color: var(--text);
    font: inherit;
    resize: vertical;
    transition: border-color 0.15s;
  }

  textarea { min-height: 80px; }

  textarea:focus, input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
  }

  .row {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .row input[type="text"] { flex: 1; min-width: 180px; }

  .counter {
    font-size: 0.8rem;
    color: var(--muted);
    text-align: right;
  }

  .counter.warn { color: var(--accent); }

  button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 0.7rem 1.4rem;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  button:hover { background: #ea580c; }
  button:active { transform: scale(0.97); }
  button:disabled { background: #3f3f46; cursor: not-allowed; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.1rem;
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
    animation: fade 0.25s ease;
  }

  @keyframes fade {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .tag {
    display: inline-block;
    background: var(--surface-2);
    color: var(--accent);
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 0.25rem 0.6rem;
    border-radius: 999px;
    align-self: flex-start;
  }

  .take {
    font-size: 1rem;
    color: var(--text);
    word-wrap: break-word;
  }

  .reactions {
    display: flex;
    gap: 0.4rem;
    margin-top: auto;
  }

  .react {
    flex: 1;
    background: var(--surface-2);
    border: 1px solid transparent;
    color: var(--muted);
    font-size: 0.85rem;
    padding: 0.5rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.3rem;
    font-weight: 500;
  }

  .react:hover { background: #3f3f46; transform: translateY(-1px); }
  .react.agree:hover { color: var(--green); border-color: var(--green); }
  .react.disagree:hover { color: var(--red); border-color: var(--red); }
  .react.spicy:hover { color: var(--spice); border-color: var(--spice); }

  .empty {
    text-align: center;
    color: var(--muted);
    padding: 3rem 1rem;
    border: 1px dashed var(--border);
    border-radius: 14px;
  }
</style>
</head>
<body>
  <div class="bg">
    <div class="orb o1"></div>
    <div class="orb o2"></div>
    <div class="orb o3"></div>
  </div>
  <div class="wrap">
    <header>
      <h1><span class="flame">🔥</span> Hot Takes Wall</h1>
      <p>Drop your spiciest opinion. No regrets.</p>
    </header>

    <form id="form">
      <textarea id="take" maxlength="120" placeholder="Your hot take..." required></textarea>
      <div class="counter" id="counter">0 / 120</div>
      <div class="row">
        <input id="topic" type="text" maxlength="24" placeholder="Topic (e.g. tech, food, music)" required />
        <button type="submit">Post Take</button>
      </div>
    </form>

    <div id="wall" class="grid"></div>
  </div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  // 🔑 Replace these with your Supabase project credentials
  const SUPABASE_URL = 'https://nbxjwwhgyxxgfdqvrtoo.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ieGp3d2hneXh4Z2ZkcXZydG9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyOTA3MjMsImV4cCI6MjA5Njg2NjcyM30.A2dsopGtaqPZsHkFzZ6WP2nqshG3JmUn17r50KLC7KA';

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form = document.getElementById('form');
  const takeInput = document.getElementById('take');
  const topicInput = document.getElementById('topic');
  const counter = document.getElementById('counter');
  const submitBtn = form.querySelector('button[type="submit"]');
  const wall = document.getElementById('wall');

  let takes = [];

  function escape(s) {
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  function render() {
    if (takes.length === 0) {
      wall.innerHTML = '<div class="empty">No takes yet. Be the first to start a fire.</div>';
      wall.style.display = 'block';
      return;
    }
    wall.style.display = 'grid';
    wall.innerHTML = takes.map(t => `
      <div class="card" data-id="${t.id}">
        <span class="tag">#${escape(t.topic)}</span>
        <div class="take">${escape(t.text)}</div>
        <div class="reactions">
          <button type="button" class="react agree" data-react="agree">👍 ${t.agree}</button>
          <button type="button" class="react disagree" data-react="disagree">👎 ${t.disagree}</button>
          <button type="button" class="react spicy" data-react="spicy">🌶️ ${t.spicy}</button>
        </div>
      </div>
    `).join('');
  }

  async function loadTakes() {
    const { data, error } = await supabase
      .from('takes')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) {
      wall.innerHTML = `<div class="empty">Error loading takes: ${escape(error.message)}</div>`;
      return;
    }
    takes = data;
    render();
  }

  takeInput.addEventListener('input', () => {
    const len = takeInput.value.length;
    counter.textContent = `${len} / 120`;
    counter.classList.toggle('warn', len > 100);
  });

  form.addEventListener('submit', async e => {
    e.preventDefault();
    const text = takeInput.value.trim();
    const topic = topicInput.value.trim().replace(/^#/, '');
    if (!text || !topic) return;

    submitBtn.disabled = true;
    const { data, error } = await supabase
      .from('takes')
      .insert({ text, topic })
      .select()
      .single();
    submitBtn.disabled = false;

    if (error) {
      alert('Failed to post take: ' + error.message);
      return;
    }

    takes.unshift(data);
    render();
    form.reset();
    counter.textContent = '0 / 120';
    counter.classList.remove('warn');
  });

  wall.addEventListener('click', async e => {
    const btn = e.target.closest('.react');
    if (!btn) return;
    const card = btn.closest('.card');
    const id = card.dataset.id;
    const kind = btn.dataset.react;
    const take = takes.find(t => t.id === id);
    if (!take) return;

    // Optimistic update
    take[kind]++;
    render();

    const { error } = await supabase.rpc('increment_reaction', {
      take_id: id,
      kind: kind,
    });
    if (error) {
      take[kind]--;
      render();
      alert('Failed to react: ' + error.message);
    }
  });

  // Realtime: live updates when others post or react
  supabase
    .channel('takes-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'takes' }, () => {
      loadTakes();
    })
    .subscribe();

  loadTakes();
</script>
</body>
</html>
